services:
  client:
    container_name: client
    build: ./client
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

  backend:
    container_name: backend
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/db/.env
    environment:
      - POSTGRES_HOST=db
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx knex migrate:latest --knexfile ./db/knexfile.js && npx knex seed:run --knexfile ./db/knexfile.js && npm start"
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: db
    image: postgres:18
    restart: unless-stopped
    env_file:
      - ./backend/db/.env
    environment:
      - POSTGRES_HOST=db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  client_node_modules:
  backend_node_modules:
  postgres_data:
